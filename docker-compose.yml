services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: deepsecurity-api
    ports:
      - "8000:8000"
    volumes:
      - ./db/faces:/app/db/faces
      - ./backend:/app/backend
      - deepface_weights:/root/.deepface
    environment:
      - DB_PATH=/app/db/faces
      - CORS_ORIGINS=http://localhost,http://localhost:5173,http://localhost:3000
      - DISABLE_NATIVE_FILE_PICKER=true
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    command: [ "uv", "run", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: deepsecurity-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  deepface_weights:
